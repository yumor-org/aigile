name: "Requirement Issue（追加の要求）"
description: "新しく欲しい機能や変更の要求を起票します。aigile の Requirement レイヤーの起点になる Issue です。"
title: "[REQ] xxx"
labels:
  - aigile:issue:req
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要 (Summary)
      description: |
        この要求を 1〜2 行で要約してください。Issue タイトルの補足や、議論の入り口になります。
      placeholder: |
        例) ログイン時に SSO（Google）を利用できるようにしたい。
    validations:
      required: true

  - type: textarea
    id: user
    attributes:
      label: 対象ユーザー (As a ...)
      description: |
        この要求の恩恵を受けるのは誰ですか？ 役割（ペルソナ）や具体的なステークホルダーで記述してください。
      placeholder: |
        例)
        - 社内の業務担当者
        - 月間アクティブユーザー
        - 管理者ロールを持つ運用担当者
    validations:
      required: true

  - type: textarea
    id: want
    attributes:
      label: 要求内容 (I want ...)
      description: |
        対象ユーザーが何をできるようになりたいかを記述してください。
        具体的な実装方法ではなく **振る舞い** として書くと AI 分析が進めやすくなります。
      placeholder: |
        例) Google アカウントを用いて、パスワード入力なしでログインできるようにしたい。
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 目的・価値 (So that ...)
      description: |
        なぜこの要求が必要か、どのような価値があるかを記述してください。
        ビジネス的価値・ユーザー体験・運用課題など、動機が伝わるように書いてください。
      placeholder: |
        例) パスワード管理の手間を減らし、退職時のアカウント無効化を SSO 側で一元的に実施できるようにするため。
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 受け入れ基準 (Acceptance Criteria)
      description: |
        この要求が「満たされた」と判断できる条件を、可能ならチェックリストで記載してください。
        実装可能性は問わず、Requirement レイヤーで合意したい **観測可能な振る舞い** を書きます。
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: false

  - type: textarea
    id: out_of_scope
    attributes:
      label: スコープ外 (Out of Scope)
      description: |
        意図的に含めない事項があれば記述してください。
        スコープを明示することで、後続レイヤーでの解釈ぶれを防ぎ、エスカレーションの予防になります。
      placeholder: |
        例)
        - 多要素認証（MFA）の導入は本要求では扱わない
        - 既存ユーザーの SSO 強制移行は別 Issue として切り出す
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: 関連 Document / Issue / PR
      description: |
        既存の Requirement / Specification / Architecture Document、関連 Issue や PR への参照があれば記載してください。
        トレーサビリティの起点になります（[docs/concepts.md](../blob/main/docs/concepts.md)）。
      placeholder: |
        - docs/requirements/auth.md
        - #98
        - https://github.com/yumor-org/aigile/pull/1
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 補足情報
      description: |
        スクリーンショット、外部資料、参考リンク、想定リスクなど、判断の助けになる情報を自由に記載してください。
        AI からの質問への回答を後から追記しても構いません。
    validations:
      required: false
