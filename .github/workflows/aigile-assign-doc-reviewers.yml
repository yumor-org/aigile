name: aigile Assign Document Reviewers

# Document PR にレビュアーを割り当てる通常 Actions ワークフロー。
# レビュアーの Source of Truth は base ブランチ（main）の .aigile/stakeholders.yml。
#
# 役割分担:
#   - aigile-requirement-doc-writer     (gh aw): Requirement Document PR を作成する（reviewers は付与しない）
#   - aigile-specification-doc-writer   (gh aw): Specification Document PR を作成する（reviewers は付与しない）
#   - aigile-architecture-doc-writer    (gh aw): Architecture Document PR を作成する（reviewers は付与しない）
#   - 本ワークフロー:                              PR の label を見てレビュアーを割り当てる
#
# 対応レイヤー:
#   ラベル `aigile:pr:req`   → layers.requirement.approvers
#   ラベル `aigile:pr:spec` → layers.specification.approvers
#   ラベル `aigile:pr:arch`  → layers.architecture.approvers
#
# pull_request_target を使う理由: base ブランチの定義と stakeholders.yml で実行することで、
# フォーク PR が承認者リストを書き換える攻撃面を排除する（PR 提供コードは実行しない）。

on:
  pull_request_target:
    types: [opened, reopened, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    # opened/reopened ではラベル付き PR、labeled では当該レイヤーラベルが付与されたときのみ実行。
    if: |
      (
        (github.event.action == 'opened' || github.event.action == 'reopened')
        && (
          contains(github.event.pull_request.labels.*.name, 'aigile:pr:req')
          || contains(github.event.pull_request.labels.*.name, 'aigile:pr:spec')
          || contains(github.event.pull_request.labels.*.name, 'aigile:pr:arch')
        )
      )
      || (
        github.event.action == 'labeled'
        && (
          github.event.label.name == 'aigile:pr:req'
          || github.event.label.name == 'aigile:pr:spec'
          || github.event.label.name == 'aigile:pr:arch'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch (Source of Truth)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          persist-credentials: false

      - name: Determine layer key from PR labels
        id: layer
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          # ラベル → stakeholders.yml の layers キーへのマッピング。
          # 複数の aigile:doc:* ラベルが同時に付与されることは想定外（PR は単一レイヤー）。
          # 万一複数あった場合は最上位レイヤー (requirement) を優先する。
          if echo "$LABELS" | grep -q '"aigile:pr:req"'; then
            key=requirement
          elif echo "$LABELS" | grep -q '"aigile:pr:spec"'; then
            key=specification
          elif echo "$LABELS" | grep -q '"aigile:pr:arch"'; then
            key=architecture
          else
            echo "::notice::No aigile:doc:* label found on PR; skipping reviewer assignment."
            key=
          fi
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - name: Extract approvers from stakeholders.yml
        id: approvers
        if: steps.layer.outputs.key != ''
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
          LAYER_KEY: ${{ steps.layer.outputs.key }}
        run: |
          set -euo pipefail
          if [ ! -f .aigile/stakeholders.yml ]; then
            echo "::notice::No .aigile/stakeholders.yml on base branch; skipping reviewer assignment."
            echo "reviewers=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # PyYAML は ubuntu-latest にプリインストール済み。
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import yaml

          author = os.environ.get("AUTHOR", "").lower()
          layer_key = os.environ.get("LAYER_KEY", "")

          with open(".aigile/stakeholders.yml") as f:
              data = yaml.safe_load(f) or {}

          layer = ((data.get("layers") or {}).get(layer_key)) or {}
          approvers_field = layer.get("approvers") or []

          # approvers は 2 形式を受ける（docs/stakeholders.md 参照）:
          #   - list:  ["@user1", "@org/team"]           ... approver_type: human
          #   - dict:  {humans: [...], ai_agents: [...]} ... approver_type: human_or_ai
          # PR レビュアー割り当ては人間のみが対象（AI エージェントは別経路で承認に関わる）。
          if isinstance(approvers_field, dict):
              raw_list = approvers_field.get("humans") or []
          elif isinstance(approvers_field, list):
              raw_list = approvers_field
          else:
              raw_list = []

          reviewers = []
          for raw in raw_list:
              if not isinstance(raw, str):
                  continue
              s = raw.strip().lstrip("@")
              if not s:
                  continue
              # gh pr edit --add-reviewer は "user" / "org/team-slug" を受け付ける。
              # PR 作者本人は GitHub 側で self-review が拒否されるため除外する。
              if "/" not in s and s.lower() == author:
                  continue
              reviewers.append(s)

          print(f"reviewers={','.join(reviewers)}")
          PY

      - name: Request reviewers
        if: steps.approvers.outputs.reviewers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEWERS: ${{ steps.approvers.outputs.reviewers }}
        run: |
          set -euo pipefail
          echo "Requesting reviewers: $REVIEWERS"
          gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-reviewer "$REVIEWERS"
